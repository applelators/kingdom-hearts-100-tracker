name = "kingdom-hearts-100-tracker"
main = "worker.js"
compatibility_date = "2025-06-01"

# Static SPA lives in ./public and is served via the ASSETS binding.
# (Worker runs only for non-asset routes — leaves room for a future /api/* sync layer.)
[assets]
directory = "./public"
binding = "ASSETS"

# Custom domain — provisions DNS + cert for kh1.nabunan.com (zone in this account).
[[routes]]
pattern = "kh1.nabunan.com"
custom_domain = true

# Cross-device progress sync: state stored under sha256(passphrase) keys.
[[kv_namespaces]]
binding = "KH1_STATE"
id = "7febe509d2e84cc39794670c5563db3e"

# Deploy to the applelators Cloudflare account:
#   wrangler deploy
# Local preview:
#   wrangler dev      (or, with no wrangler installed: `python3 -m http.server` inside ./public)
